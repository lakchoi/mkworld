<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK 맘월드 | 보안 관리자 모드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>body { font-family: 'Pretendard', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl p-8 border border-gray-100">
        <!-- 헤더 -->
        <div class="text-center mb-8">
            <div class="inline-block bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-sm font-bold mb-3">Admin Only</div>
            <h1 class="text-2xl font-black text-slate-800">캠페인 보안 등록</h1>
            <p class="text-slate-500 text-sm mt-2">비밀번호가 있어야 서버에 저장됩니다.</p>
        </div>

        <!-- 입력 폼 -->
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">카테고리</label>
                <input id="category" type="text" placeholder="예: 안전동행, 교육지원" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">캠페인 제목</label>
                <input id="title" type="text" placeholder="제목을 입력하세요" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">상세 내용</label>
                <textarea id="desc" rows="4" placeholder="내용을 입력하세요" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition duration-200 resize-none"></textarea>
            </div>

            <div class="pt-2">
                <button onclick="uploadCampaign()" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-blue-600 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-slate-200">
                    홈페이지에 안전하게 게시하기
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 연결 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 [필수] 대표님의 실제 firebaseConfig 값을 여기에 복사해서 넣으세요!
        const firebaseConfig = {
            apiKey: "AIzaSyAcVf3Z0i-kXr7KGkC6LdXqP5QqhbNT5eU",
            authDomain: "mkmomworld.firebaseapp.com",
            projectId: "mkmomworld",
            storageBucket: "mkmomworld.firebasestorage.app",
            messagingSenderId: "479013933003",
            appId: "1:479013933003:web:bd77a7006c7979ffaff04e",
            measurementId: "G-PX8W9MKQL6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.uploadCampaign = async () => {
            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const btn = document.getElementById('submitBtn');

            if(!category || !title || !desc) {
                alert("빈칸을 모두 채워주세요!");
                return;
            }

            // 1. 비밀번호 물어보기
            const password = prompt("보안 비밀번호를 입력하세요:");
            if(!password) return;

            btn.disabled = true;
            btn.innerText = "보안 검토 중...";

            try {
                // 2. 서버에 데이터 보낼 때 비밀번호 필드를 포함 (adminPassword)
                await addDoc(collection(db, "campaigns"), {
                    category: category,
                    title: title,
                    desc: desc,
                    adminPassword: password, // 규칙에서 검사할 필드
                    createdAt: serverTimestamp()
                });
                
                alert("✅ 인증 성공! 캠페인이 등록되었습니다.");
                
                // 입력창 초기화
                document.getElementById('category').value = '';
                document.getElementById('title').value = '';
                document.getElementById('desc').value = '';

            } catch (e) {
                console.error("에러 내용:", e);
                alert("❌ 등록 실패: 비밀번호가 틀렸거나 권한이 없습니다.");
            } finally {
                btn.disabled = false;
                btn.innerText = "홈페이지에 안전하게 게시하기";
            }
        };
    </script>
</body>
</html>
