<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK MOM WORLD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; word-break: keep-all; }
        .fade-in { animation: fadeIn 1.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black">

    <!-- 상단 바 -->
    <nav class="fixed top-0 w-full z-50 px-6 py-5 flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent">
        <h1 class="text-2xl font-black text-white tracking-tighter">MK MOM WORLD</h1>
        <a href="https://cafe.naver.com/rede9bak" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm shadow-xl">JOIN CAFE</a>
    </nav>

    <!-- 섹션 출력부 -->
    <main id="vibe-container" class="space-y-[2px]"></main>

    <!-- 푸터 -->
    <footer class="bg-black py-32 text-center border-t border-zinc-800">
        <p class="text-zinc-600 text-sm tracking-[0.3em] font-light">© 2024 MK MOM WORLD</p>
        <a href="admin.html" class="text-zinc-900 text-[10px] block mt-10">System Admin</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* 대표님의 파이어베이스 설정값 복사/붙여넣기 (어드민과 동일하게) */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "sections"), (snapshot) => {
            const container = document.getElementById('vibe-container');
            const data = {};
            snapshot.forEach(doc => data[doc.id] = doc.data());
            
            let finalHtml = '';
            for(let i=1; i<=8; i++) {
                const s = data[`sec${i}`];
                if(s && s.show) {
                    finalHtml += `
                    <section class="relative w-full h-screen min-h-[600px] flex ${s.align} justify-center px-8 overflow-hidden">
                        <img src="${s.img}" class="absolute inset-0 w-full h-full object-cover z-0 transition-transform duration-700 hover:scale-105">
                        <div class="absolute inset-0 bg-black/40 z-10"></div>
                        <div class="relative z-20 text-white max-w-3xl fade-in">
                            <h2 class="text-5xl md:text-7xl font-black mb-8 leading-[1.1] drop-shadow-2xl">${s.title}</h2>
                            <p class="text-lg md:text-2xl opacity-80 leading-relaxed whitespace-pre-wrap font-medium drop-shadow-lg">${s.desc}</p>
                        </div>
                    </section>`;
                }
                if(i === 6) { // 유튜브 섹션
                    const yt = data['youtube'];
                    if(yt && yt.show) {
                        finalHtml += `
                        <section class="bg-zinc-950 py-32 px-6">
                            <div class="max-w-5xl mx-auto aspect-video rounded-[3rem] overflow-hidden shadow-[0_0_50px_rgba(255,255,255,0.1)] border border-zinc-800">
                                <iframe class="w-full h-full" src="https://www.youtube.com/embed/${yt.videoId}?autoplay=1&mute=1&loop=1" frameborder="0" allowfullscreen></iframe>
                            </div>
                        </section>`;
                    }
                }
            }
            container.innerHTML = finalHtml;
        });
    </script>
</body>
</html>
