<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK 맘월드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>body { font-family: 'Pretendard', sans-serif; overflow-x: hidden; }</style>
</head>
<body class="bg-white">

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 p-5">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-black text-blue-600 tracking-tight">MK 맘월드</span>
            <a href="https://cafe.naver.com/rede9bak" target="_blank" class="text-xs bg-black text-white px-5 py-2 rounded-full font-bold">공식카페</a>
        </div>
    </nav>

    <div id="main-frame"></div>

    <footer class="bg-gray-100 py-20 px-6 text-center border-t mt-1 text-slate-400">
        <p class="font-black text-slate-800 text-xl mb-4 italic">MK MOM WORLD</p>
        <p class="text-xs">엄마들의 행복을 위한 커뮤니티</p>
        <p class="text-[10px] mt-10">© 2024 MK MOM WORLD. <a href="admin.html" class="opacity-30">Admin</a></p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 여기에 대표님의 파이어베이스 컨피그를 넣으세요 (어드민과 동일하게)
        const firebaseConfig = {
    apiKey: "AIzaSyAcVf3Z0i-kXr7KGkC6LdXqP5QqhbNT5eU",
    authDomain: "mkmomworld.firebaseapp.com",
    projectId: "mkmomworld",
    storageBucket: "mkmomworld.firebasestorage.app",
    messagingSenderId: "479013933003",
    appId: "1:479013933003:web:bd77a7006c7979ffaff04e",
    measurementId: "G-PX8W9MKQL6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "sections"), (snapshot) => {
            const frame = document.getElementById('main-frame');
            const data = {};
            snapshot.forEach(doc => data[doc.id] = doc.data());
            
            let html = '';
            for(let i=1; i<=8; i++) {
                const s = data[`sec${i}`];
                if(s && s.show) {
                    html += `
                    <section class="relative w-full h-[650px] flex ${s.align} justify-center px-6 overflow-hidden mb-1">
                        <img src="${s.img}" class="absolute inset-0 w-full h-full object-cover z-0">
                        <div class="absolute inset-0 bg-black/40 z-10"></div>
                        <div class="relative z-20 text-white max-w-xl">
                            <h2 class="text-5xl font-black mb-6 leading-tight drop-shadow-2xl">${s.title}</h2>
                            <p class="text-xl opacity-90 leading-relaxed whitespace-pre-wrap drop-shadow-lg">${s.desc}</p>
                        </div>
                    </section>`;
                }
                
                if(i === 6) { // 6번 섹션 뒤 유튜브 배치
                    const yt = data['youtube'];
                    if(yt && yt.show) {
                        html += `
                        <section class="bg-slate-900 py-24 px-6 my-1">
                            <div class="max-w-4xl mx-auto aspect-video rounded-[3rem] overflow-hidden shadow-2xl border border-white/10">
                                <iframe class="w-full h-full" src="https://www.youtube.com/embed/${yt.videoId}" frameborder="0" allowfullscreen></iframe>
                            </div>
                        </section>`;
                    }
                }
            }
            frame.innerHTML = html;
        });
    </script>
</body>
</html>
