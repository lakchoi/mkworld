<!-- ... (헤더 부분 동일) ... -->
<div id="main-frame" class="w-full overflow-x-hidden"></div>
<!-- ... (푸터 부분 동일) ... -->

<script type="module">
    // ... (파이어베이스 설정 부분 동일) ...

    onSnapshot(collection(db, "sections"), (snapshot) => {
        const frame = document.getElementById('main-frame');
        const data = {};
        snapshot.forEach(doc => data[doc.id] = doc.data());
        
        let html = '';
        for(let i=1; i<=8; i++) {
            const s = data[`sec${i}`];
            // ⭐️ 여기서 s.show 가 체크된 섹션만 보여줍니다!
            if(s && s.show) {
                html += `
                <section class="relative w-full h-[600px] flex ${s.align} justify-center px-10 overflow-hidden mb-2">
                    <img src="${s.img}" class="absolute inset-0 w-full h-full object-cover z-0">
                    <div class="absolute inset-0 bg-black/40 z-10"></div>
                    <div class="relative z-20 text-white max-w-2xl animate-fade-in">
                        <h2 class="text-5xl font-black mb-6 drop-shadow-2xl leading-tight">${s.title}</h2>
                        <p class="text-xl opacity-90 leading-relaxed whitespace-pre-wrap drop-shadow-md">${s.desc}</p>
                    </div>
                </section>`;
            }
            
            // ⭐️ 유튜브 섹션도 show 가 체크되었을 때만 노출!
            if(i === 6) {
                const yt = data['youtube'];
                if(yt && yt.show) {
                    html += `
                    <section class="bg-black py-24 px-6">
                        <div class="max-w-4xl mx-auto aspect-video rounded-[3rem] overflow-hidden shadow-2xl border border-white/10">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${yt.videoId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    </section>`;
                }
            }
        }
        frame.innerHTML = html;
    });
</script>
